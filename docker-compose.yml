services:
  backend:
    build:
      context: ./backend
    container_name: herbal-chatbot-backend
    environment:
      HERBAL_DATA_DIR: ${HERBAL_DATA_DIR:-/app/data/referensi}
      CHROMA_DB_DIR: ${CHROMA_DB_DIR:-/app/.chroma}
      ENABLE_DUAL_LLM_COMPARISON: ${ENABLE_DUAL_LLM_COMPARISON:-true}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL_A: ${OLLAMA_MODEL_A:-deepseek-r1:1.5b}
      OLLAMA_MODEL_B: ${OLLAMA_MODEL_B:-gemma4:e2b}
      OLLAMA_MODEL_B_FALLBACKS: ${OLLAMA_MODEL_B_FALLBACKS:-gemma4:latest,gemma3:1b}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-45}
      OLLAMA_NUM_PREDICT_DEFAULT: ${OLLAMA_NUM_PREDICT_DEFAULT:-220}
      OLLAMA_NUM_PREDICT_RECOMMENDATION: ${OLLAMA_NUM_PREDICT_RECOMMENDATION:-768}
      OLLAMA_NUM_PREDICT_FOLLOW_UP: ${OLLAMA_NUM_PREDICT_FOLLOW_UP:-140}
      OLLAMA_NUM_PREDICT_RED_FLAG: ${OLLAMA_NUM_PREDICT_RED_FLAG:-120}
      OLLAMA_NUM_PREDICT_OUT_OF_SCOPE: ${OLLAMA_NUM_PREDICT_OUT_OF_SCOPE:-120}
      LEARNING_LOG_PATH: ${LEARNING_LOG_PATH:-/app/data/learning/dual_llm_interactions.jsonl}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "8000:8000"
    volumes:
      - ./.chroma:/app/.chroma
      - ../data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: herbal-chatbot-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
