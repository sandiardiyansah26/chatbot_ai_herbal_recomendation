<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>AI Chatbot Ramuan Herbal</title>
    <link rel="stylesheet" href="./styles.css?v=20260424-inference-metrics-v1" />
  </head>
  <body>
    <div class="workspace">
      <aside class="history-sidebar" aria-label="Riwayat percakapan">
        <div class="sidebar-brand">
          <span class="brand-mark">AI</span>
          <div>
            <strong>Herbal Chat</strong>
            <small>Riwayat anamnesis</small>
          </div>
        </div>
        <button id="new-chat-button" class="new-chat-button" type="button">+ Chat Baru</button>
        <div class="history-heading">Percakapan</div>
        <div id="history-list" class="history-list"></div>
        <button id="clear-history-button" class="clear-history-button" type="button">Hapus riwayat</button>
      </aside>

      <main class="app-shell">
        <section class="chat-panel" aria-label="Chatbot ramuan herbal">
          <div class="chat-header">
            <div>
              <span>Percakapan aktif</span>
              <strong id="active-chat-title">Chat baru</strong>
            </div>
            <div class="chat-header-actions">
              <button id="export-conversation-button" type="button">Export Excel</button>
              <button id="new-chat-inline-button" type="button">+ Baru</button>
            </div>
          </div>
          <div id="messages" class="messages"></div>
          <div id="dynamic-replies" class="dynamic-replies" aria-label="Saran jawaban cepat"></div>
          <form id="chat-form" class="chat-form">
            <textarea
              id="message-input"
              rows="2"
              placeholder="Contoh: tenggorokan saya tidak nyaman sejak kemarin"
              required
            ></textarea>
            <button type="submit">Kirim</button>
          </form>
          
        </section>
      </main>
    </div>

    <script src="./runtime-config.js?v=20260426-root-config-v1"></script>
    <script src="./app.js?v=20260426-root-config-v1"></script>
  </body>
</html>
